services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: nlff
      POSTGRES_PASSWORD: nlff_password
      POSTGRES_DB: nlff
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nlff -d nlff']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    command: /bin/sh -c "alembic upgrade heads && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg://nlff:nlff_password@db:5432/nlff
      PYTHONPATH: /app
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
